<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H LUXURY — Haute Maroquinerie & Souliers</title>
    
    <!-- CODE INJECTÉ POUR LE LOGO D'ONGLET SANS FICHIER IMAGE (STYLE HERMÈS) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Times New Roman, serif%22 font-weight=%22bold%22 fill=%22%23111111%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --accent-color: #e65a1b; /* L'orange signature */
            --gray-light: #f9f9f9;
            --border-color: #eaeaea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Barre d'annonce subtile */
        .top-bar {
            background-color: #111111;
            color: #ffffff;
            text-align: center;
            padding: 8px 0;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 300;
            letter-spacing: 2px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            font-weight: 300;
            font-size: 24px;
            letter-spacing: 9px;
            text-transform: uppercase;
            cursor: pointer;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 400;
            transition: color 0.3s;
            padding-bottom: 4px;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
        }

        .search-container {
            position: relative;
        }

        .search-container input {
            width: 180px;
            padding: 6px 12px;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 11px;
            outline: none;
            transition: all 0.4s ease;
            background: transparent;
        }

        .search-container input:focus {
            width: 240px;
            border-bottom-color: var(--text-color);
        }

        .header-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -7px;
            right: -9px;
            background: var(--text-color);
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BANNIÈRE HAUTE COUTURE (Ajustée pour s'afficher à coup sûr) */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 70vh; /* Plus grande, style défilé */
            overflow: hidden;
            background: url('banniere-fallback.jpg') no-repeat center center/cover; /* Image si la vidéo bugue */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-banner video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); /* Voile très léger pour le minimalisme */
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #ffffff;
        }

        .hero-content h2 {
            font-size: 45px;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .btn-luxury {
            background: #ffffff;
            color: #111111;
            padding: 14px 40px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 400;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-luxury:hover {
            background: #111111;
            color: #ffffff;
        }

        .section-title {
            text-align: center;
            margin: 70px 0 40px 0;
            text-transform: uppercase;
            font-weight: 300;
            font-size: 22px;
            letter-spacing: 5px;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 4% 80px 4%;
        }

        /* Collections style double vitrine */
        .collections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 60px;
        }

        .collection-card {
            position: relative;
            height: 500px;
            overflow: hidden;
            cursor: pointer;
        }

        .collection-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .collection-card:hover img {
            transform: scale(1.03);
        }

        .collection-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: white;
            z-index: 2;
        }

        .collection-overlay h3 {
            font-size: 24px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .collection-overlay p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            display: inline-block;
            padding-bottom: 2px;
        }

        /* Grille Produits Épurée */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px 25px;
        }

        .product-card {
            background: #ffffff;
            position: relative;
        }

        .badge-promo {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent-color);
            color: white;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 400;
            z-index: 10;
            text-transform: uppercase;
        }

        .product-img-container {
            width: 100%;
            padding-bottom: 115px; /* Format légèrement vertical type catalogue luxe */
            position: relative;
            background: var(--gray-light);
            overflow: hidden;
            cursor: pointer;
        }

        .product-img-container img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.4s;
        }

        .product-info {
            padding: 15px 0;
            text-align: left; /* Aligné à gauche style Hermès */
        }

        .product-title {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 6px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price-box {
            font-size: 13px;
            margin-bottom: 12px;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            margin-right: 8px;
            font-weight: 300;
        }

        .current-price {
            font-weight: 400;
            color: #111;
        }

        .btn-buy-direct {
            background: transparent;
            color: #111;
            border: 1px solid #111;
            width: 100%;
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-buy-direct:hover {
            background: #111;
            color: #fff;
        }

        /* Tiroir Panier & Modale */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; width: 90%; max-width: 750px; display: grid; grid-template-columns: 1fr 1fr; position: relative; padding: 20px; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 22px; cursor: pointer; z-index: 10; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        
        select { width: 100%; padding: 12px; border: 1px solid var(--border-color); background: white; margin-bottom: 20px; font-size: 12px; outline: none; }

        .cart-sidebar {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
            background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.05); z-index: 1100;
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; padding: 40px 30px;
        }
        .cart-sidebar.active { right: 0; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 25px; }
        .cart-item img { width: 70px; height: 70px; object-fit: cover; }
        
        .btn-checkout { width: 100%; background: #111111; color: white; border: none; padding: 15px; text-transform: uppercase; font-size: 11px; font-weight: 400; cursor: pointer; letter-spacing: 2px; }
        .btn-checkout:hover { background: var(--accent-color); }

        /* FOOTER LÉGAL PROFESSIONNEL STYLE HERMÈS */
        footer {
            background: #fbfbfb;
            border-top: 1px solid var(--border-color);
            padding: 60px 5% 30px 5%;
            font-size: 12px;
            color: #555;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1440px;
            margin: 0 auto 50px auto;
            text-align: left;
        }

        .footer-col h4 {
            color: #111;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 11px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 10px;
        }

        .footer-col ul li a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 12px;
        }

        .footer-col ul li a:hover {
            color: var(--accent-color);
        }

        .footer-bottom {
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            font-size: 11px;
            color: #999;
        }

        /* Modales Infos Légales */
        .legal-box {
            max-height: 400px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #444;
            padding-right: 10px;
        }
        .legal-box h5 { margin: 15px 0 5px 0; color: #111; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
